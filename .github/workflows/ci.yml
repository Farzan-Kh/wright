name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: vet & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: true
      - run: go vet ./...
      - run: go test -race ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: true
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
