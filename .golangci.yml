# golangci-lint v2 configuration. Minimal, high-signal set.
version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - misspell
  settings:
    errcheck:
      # Writes to CLI output streams; errors there are not actionable.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln

formatters:
  enable:
    - gofmt
