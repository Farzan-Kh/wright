# Wright example configuration.
#
# Copy to wright.yaml and edit. Credentials are NEVER stored here — Wright reads
# tokens from environment variables (see token_env / the README's env-var table).

version: 1

# cache: where Wright persists partial progress from an interrupted
# issue-resolution attempt (turn limit hit, sandbox fault, failed
# commit/push/PR) so the next attempt resumes instead of re-spending LLM
# turns from scratch. Shared across every repo below. Optional.
# cache:
#   dir: .wright/cache

repos:
  - provider: github # "github" | "gitlab"
    repo: your-org/your-repo # GitLab: full project path, nested groups OK

    # api_base_url: https://gitlab.example.com   # GitHub Enterprise / self-hosted GitLab only

    # token_env: MY_TOKEN_VAR   # env var NAME to read the token from.
    # Defaults, in order:
    #   WRIGHT_GITHUB_TOKEN -> GITHUB_TOKEN   (github)
    #   WRIGHT_GITLAB_TOKEN -> GITLAB_TOKEN   (gitlab)

    trigger_label: wright # issue label Wright acts on; default "wright"

    # base_branch: main         # default: the repo's default branch, via the API

    auto_merge: false # default false — explicit opt-in, gated on CI in later phases

    budget: # enforced in Phase 1
      max_turns: 30
      # max_total_tokens: 200000  # cap total tokens (in+out+cache) per issue; 0 = unlimited
      # max_usd: 5.00             # cap total USD spent per issue; 0 = not enforced.
      #                           # Requires an llm.rates entry below for both
      #                           # agent_model and gate_model.

    llm:
      provider: claude
      auth: api_key # api_key | oauth
      # api_key_env: ANTHROPIC_API_KEY
      agent_model: claude-sonnet-5
      gate_model: claude-haiku-4-5
      effort: high

      # rates: per-model USD pricing ($/MTok = per million tokens), used to
      # price the USD column in `wright run`'s report and, if set, to enforce
      # budget.max_usd above. cache_read_per_mtok / cache_write_per_mtok
      # default to 0.10x / 1.25x input_per_mtok (Anthropic's standard cache
      # multipliers) when left unset, so you can usually omit them. Current
      # Claude list prices (see https://claude.com/pricing#api), as of
      # 2026-07:
      # rates:
      #   claude-sonnet-5:   # introductory pricing through 2026-08-31; $3/$15 after
      #     input_per_mtok: 2.00
      #     output_per_mtok: 10.00
      #   claude-haiku-4-5:
      #     input_per_mtok: 1.00
      #     output_per_mtok: 5.00

      # OAuth/subscription mode is accepted by the schema but NOT activated in
      # Phase 1 (deferred to Phase 2); `wright run` rejects auth: oauth. Example:
      # auth: oauth
      # oauth:
      #   access_token_env: WRIGHT_CLAUDE_OAUTH_TOKEN
      #   access_token_expiry_env: WRIGHT_CLAUDE_OAUTH_EXPIRES_AT  # RFC3339 timestamp
      #   refresh_token_env: WRIGHT_CLAUDE_OAUTH_REFRESH_TOKEN     # optional
      #   client_id_env: WRIGHT_CLAUDE_OAUTH_CLIENT_ID             # optional (required if refresh_token_env set)
      #   token_url: https://auth.example.com/oauth/token          # optional (required if refresh_token_env set)

      # OpenRouter example (access 200+ models via a single API key):
      # provider: openrouter
      # auth: api_key  # only api_key is supported
      # api_key_env: OPENROUTER_API_KEY  # or WRIGHT_OPENROUTER_API_KEY
      # agent_model: anthropic/claude-sonnet-4-5
      # gate_model: openai/gpt-4o-mini
      # effort: high

    sandbox:
      image: alpine/git:2.47.2
      workdir: /workspace

    # retry: controls backoff for connection attempts to the provider API,
    # the LLM API, and the Docker daemon. All fields are optional.
    # retry:
    #   strategy: exponential   # exponential | fixed (simple time-based retries)
    #   max_attempts: 4         # total tries including the first; 1 disables retrying
    #   base_delay_ms: 500      # delay before the first retry (and every retry under "fixed")
    #   max_delay_ms: 30000     # cap on any single retry delay
    #   exponent: 2             # per-attempt delay multiplier under "exponential"

    verify:
      # command: make test

    # prompt: customizes the agent's system prompt. Both fields are optional
    # and mutually exclusive (wright validate rejects setting both).
    # prompt:
    #   # system_append adds repo-specific instructions after Wright's default
    #   # behavior guidance (identity, scope discipline, guardrails). Safe for
    #   # most use cases.
    #   system_append: "Always update CHANGELOG.md when you change public behavior."
    #
    #   # system_override fully REPLACES Wright's default behavior guidance.
    #   # ADVANCED — only use this if you know exactly what you're discarding:
    #   # Wright's operational contract (don't self-commit/push, tool path
    #   # rules, verify-retry behavior) is a separate block that is ALWAYS
    #   # enforced regardless of this setting, but everything else — the
    #   # "smallest correct change" philosophy and the default guardrails
    #   # around CI/CD files and scope — is gone unless you restate it here.
    #   # system_override: |
    #   #   You are a specialized agent for this repo. ...

    # stacking: if issue #14 references issue #13 and #13 already has an open
    # Wright PR, Wright branches #14's work off #13's PR branch instead of
    # blocking until a human merges #13, then retargets #14's PR onto the
    # real base branch once #13 merges. Off by default — this changes what
    # code gets combined into a PR before human review.
    # stacking:
    #   enabled: true
