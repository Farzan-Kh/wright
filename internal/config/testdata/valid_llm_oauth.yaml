version: 1
repos:
  - provider: github
    repo: acme/widgets
    llm:
      provider: claude
      auth: oauth
      agent_model: claude-sonnet-5
      gate_model: claude-haiku-4-5
      effort: medium
      oauth:
        access_token_env: WRIGHT_CLAUDE_OAUTH_TOKEN
        access_token_expiry_env: WRIGHT_CLAUDE_OAUTH_EXPIRES_AT
        refresh_token_env: WRIGHT_CLAUDE_OAUTH_REFRESH_TOKEN
        client_id_env: WRIGHT_CLAUDE_OAUTH_CLIENT_ID
        token_url: https://auth.example.com/oauth/token
