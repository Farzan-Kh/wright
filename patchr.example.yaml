# Patchr example configuration.
#
# Copy to patchr.yaml and edit. Credentials are NEVER stored here — Patchr reads
# tokens from environment variables (see token_env / the README's env-var table).

version: 1

repos:
  - provider: github # "github" | "gitlab"
    repo: your-org/your-repo # GitLab: full project path, nested groups OK

    # api_base_url: https://gitlab.example.com   # GitHub Enterprise / self-hosted GitLab only

    # token_env: MY_TOKEN_VAR   # env var NAME to read the token from.
    # Defaults, in order:
    #   PATCHR_GITHUB_TOKEN -> GITHUB_TOKEN   (github)
    #   PATCHR_GITLAB_TOKEN -> GITLAB_TOKEN   (gitlab)

    trigger_label: patchr # issue label Patchr acts on; default "patchr"

    # base_branch: main         # default: the repo's default branch, via the API

    auto_merge: false # default false — explicit opt-in, gated on CI in later phases

    budget: # enforced in Phase 1
      max_turns: 30

    llm:
      provider: claude
      auth: api_key # api_key | oauth
      # api_key_env: ANTHROPIC_API_KEY
      agent_model: claude-sonnet-5
      gate_model: claude-haiku-4-5
      effort: high

      # OAuth/subscription mode is accepted by the schema but NOT activated in
      # Phase 1 (deferred to Phase 2); `patchr run` rejects auth: oauth. Example:
      # auth: oauth
      # oauth:
      #   access_token_env: PATCHR_CLAUDE_OAUTH_TOKEN
      #   access_token_expiry_env: PATCHR_CLAUDE_OAUTH_EXPIRES_AT  # RFC3339 timestamp
      #   refresh_token_env: PATCHR_CLAUDE_OAUTH_REFRESH_TOKEN     # optional
      #   client_id_env: PATCHR_CLAUDE_OAUTH_CLIENT_ID             # optional (required if refresh_token_env set)
      #   token_url: https://auth.example.com/oauth/token          # optional (required if refresh_token_env set)

      # OpenRouter example (access 200+ models via a single API key):
      # provider: openrouter
      # auth: api_key  # only api_key is supported
      # api_key_env: OPENROUTER_API_KEY  # or PATCHR_OPENROUTER_API_KEY
      # agent_model: anthropic/claude-sonnet-4-5
      # gate_model: openai/gpt-4o-mini
      # effort: high

    sandbox:
      image: alpine/git:2.47.2
      workdir: /workspace

    # retry: controls backoff for connection attempts to the provider API,
    # the LLM API, and the Docker daemon. All fields are optional.
    # retry:
    #   strategy: exponential   # exponential | fixed (simple time-based retries)
    #   max_attempts: 4         # total tries including the first; 1 disables retrying
    #   base_delay_ms: 500      # delay before the first retry (and every retry under "fixed")
    #   max_delay_ms: 30000     # cap on any single retry delay
    #   exponent: 2             # per-attempt delay multiplier under "exponential"

    verify:
      # command: make test

    # prompt: customizes the agent's system prompt. Both fields are optional
    # and mutually exclusive (patchr validate rejects setting both).
    # prompt:
    #   # system_append adds repo-specific instructions after Patchr's default
    #   # behavior guidance (identity, scope discipline, guardrails). Safe for
    #   # most use cases.
    #   system_append: "Always update CHANGELOG.md when you change public behavior."
    #
    #   # system_override fully REPLACES Patchr's default behavior guidance.
    #   # ADVANCED — only use this if you know exactly what you're discarding:
    #   # Patchr's operational contract (don't self-commit/push, tool path
    #   # rules, verify-retry behavior) is a separate block that is ALWAYS
    #   # enforced regardless of this setting, but everything else — the
    #   # "smallest correct change" philosophy and the default guardrails
    #   # around CI/CD files and scope — is gone unless you restate it here.
    #   # system_override: |
    #   #   You are a specialized agent for this repo. ...
